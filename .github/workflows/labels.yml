name: Sync Labels
on:
  push:
    paths:
      - .github/labels.yml
  workflow_dispatch:
jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete_other_labels: true
          token: ${{ secrets.GITHUB_TOKEN }}
