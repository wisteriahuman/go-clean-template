version: "2"

linters:
  default: none
  enable:
    - errcheck    # errorの握りつぶし検出
    - govet       # 公式静的解析
    - staticcheck # バグになりうるパターン
    - errorlint   # errors.Isを使わずに==比較してないか
    - misspell    # スペルミス
    - gosec       # セキュリティ問題
    - unused      # 未使用変数・関数の検出

  settings:
    gosec:
      excludes:
        - G304 # ファイルパスの変数使用は許可
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives

formatters:
  enable:
    - gofmt    # コードフォーマット
    - goimports # importの整理
